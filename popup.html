<!DOCTYPE html>
<html>
    <head>
        <title>TabClose Settings</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Settings</h1>
        <div class="setting-item">
            <label for="inactivity-limit">Close tabs after (minutes)</label>
            <input type="number" id="inactivity-limit" class="inactivity-input" min="1" />
        </div>

       
        <h2>Excluded Domains</h2>
        <ul id="domain-list"></ul>

        <div class="input-group">
            <input type="text" id="new-domain" placeholder="e.g. google.com" />
            <button id="add-domain">Add</button>
        </div>
        <script src="popup.js"></script>
    </body>
</html>
